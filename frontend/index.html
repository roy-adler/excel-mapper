<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>xlsx-mapper</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>xlsx-mapper</h1>
      <p class="subtle">Collaborative schema-driven Excel editing with share links.</p>

      <section class="card">
        <h2>Auth</h2>
        <div class="grid two">
          <form id="register-form">
            <h3>Register</h3>
            <input name="email" type="email" placeholder="Email" required />
            <input name="password" type="password" placeholder="Password" minlength="6" required />
            <button type="submit">Register</button>
          </form>
          <form id="login-form">
            <h3>Login</h3>
            <input name="email" type="email" placeholder="Email" required />
            <input name="password" type="password" placeholder="Password" required />
            <button type="submit">Login</button>
          </form>
        </div>
        <p id="auth-status" class="subtle"></p>
      </section>

      <section class="card">
        <h2>Create Template</h2>
        <form id="template-form">
          <input name="name" placeholder="Template name" required />
          <input name="file" type="file" accept=".xlsx" required />
          <textarea
            name="schema"
            rows="7"
            required
          >[
  {"sheet":"Sheet1","range":"A1:A10","type":"number","label":"Amount"},
  {"sheet":"Sheet1","range":"B1:B10","type":"string","label":"Description"},
  {"sheet":"Sheet1","range":"C1:C10","type":"boolean","label":"Approved"},
  {"sheet":"Sheet1","range":"D1:D10","type":"date","label":"Date"}
]</textarea>
          <button type="submit">Create Template</button>
        </form>
      </section>

      <section class="card">
        <h2>Templates</h2>
        <button id="refresh-templates" type="button">Refresh Templates</button>
        <ul id="template-list"></ul>
      </section>

      <section class="card">
        <h2>Sessions</h2>
        <button id="refresh-sessions" type="button">Refresh Sessions</button>
        <ul id="session-list"></ul>
      </section>

      <section class="card">
        <h2>Open Public Session</h2>
        <form id="public-open-form" class="inline">
          <input name="shareToken" placeholder="Share token" required />
          <input name="guestName" placeholder="Guest name" value="guest" />
          <button type="submit">Open</button>
        </form>
      </section>

      <section class="card" id="editor-section">
        <h2>Session Editor</h2>
        <p id="editor-meta" class="subtle"></p>
        <form id="editor-form"></form>
        <div class="inline">
          <button id="save-session" type="button">Save</button>
          <button id="download-session" type="button">Download</button>
        </div>
      </section>

      <pre id="log"></pre>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
